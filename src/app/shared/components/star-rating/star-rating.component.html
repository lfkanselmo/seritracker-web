<div class="star-rating" (mouseleave)="onLeave()">
  @for (star of stars; track star) {
    <span
      class="star"
      [class.active]="star <= displayValue"
      [class.readonly]="readonly"
      (mouseenter)="onHover(star)"
      (click)="onSelect(star)">
      ★
    </span>
  }
  @if (value) {
    <span class="rating-value">{{ value }}/10</span>
  }
</div>
